[loggers]
keys=root,primitives,functions,recommenders,experiments

[handlers]
keys=consoleHandler,fileHandler

[formatters]
keys=simpleFormatter,dateFormatter

[logger_root]
level=INFO
handlers=consoleHandler,fileHandler

[logger_primitives]
level=INFO
handlers=consoleHandler,fileHandler
qualname=solidago.primitives
propagate=0

[logger_functions]
level=INFO
handlers=consoleHandler,fileHandler
qualname=solidago.functions
propagate=0

[logger_recommenders]
level=INFO
handlers=consoleHandler,fileHandler
qualname=solidago.recommenders
propagate=0

[logger_experiments]
level=INFO
handlers=consoleHandler,fileHandler
qualname=solidago.experiments
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=INFO
formatter=simpleFormatter
args=(sys.stdout,)

[handler_fileHandler]
class=FileHandler
level=INFO
formatter=dateFormatter
args=("file.log",)

[formatter_simpleFormatter]
format=%(levelname)s: %(message)s

[formatter_dateFormatter]
format=%(asctime)s - %(levelname)s: %(message)s
