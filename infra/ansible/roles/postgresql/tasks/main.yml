- name: Ensure a locale exists
  locale_gen:
    name: en_US.UTF-8
    state: present

# PostgreSQL versions:
#   Debian 11 (bullseye) → PG13 from the Debian repository
#   Debian 13 (trixie)   → PG17 from the Debian repository
# The default 'postgresql' meta-package resolves to the distro-provided version.
- name: Install PostgreSQL (distro-provided version)
  apt:
    name: postgresql
    install_recommends: no
    update_cache: yes

# On Debian 11, PG17 is not available in the Debian repository.
# The PGDG repository is added to install it alongside PG13,
# in preparation for migration.
# On Debian 13, PG17 is the distro-provided version (installed above),
# so neither the PGDG repository nor this extra install task are needed.
- name: Add PostgreSQL PGDG repository
  deb822_repository:
    name: pgdg
    types: deb
    uris: https://apt.postgresql.org/pub/repos/apt
    suites: "{{ ansible_distribution_release }}-pgdg"
    components: main
    signed_by: https://www.postgresql.org/media/keys/ACCC4CF8.asc
    state: present
  when:
    - ansible_distribution == "Debian"
    - ansible_distribution_version == "11"

- name: Install PostgreSQL 17 (PGDG, migration target)
  apt:
    name:
      - postgresql-17
      - postgresql-client-17
    install_recommends: no
    update_cache: yes
  when:
    - ansible_distribution == "Debian"
    - ansible_distribution_version == "11"

- name: Create Postgresql backups directory
  file:
    state: directory
    path: /backups/tournesol
    owner: postgres
    group: postgres

- name: Create Postgresql DB backups directory
  file:
    state: directory
    path: /backups/tournesol/db
    owner: postgres
    group: postgres

- name: Install pg_backup configuration
  template:
    dest: /etc/postgresql/pg_backup.config
    src: pg_backup.config.j2

- name: Install pg_backup script
  template:
    dest: /usr/local/bin/pg_backup_rotated.sh
    src: pg_backup_rotated.sh.j2
    mode: a+rx

- name: Install Postgresql backups service
  template:
    src: pg-backups.service.j2
    dest: /etc/systemd/system/pg-backups.service

- name: Install Postgresql backups timer
  template:
    src: pg-backups.timer
    dest: /etc/systemd/system/pg-backups.timer

- name: Enable Postgresql backups timer
  systemd:
    name: pg-backups.timer
    state: started
    enabled: yes
    daemon_reload: yes
